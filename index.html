<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Produtividade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #00ff41; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        .card { 
            background: rgba(20, 30, 60, 0.4); 
            border: 1px solid rgba(0, 255, 65, 0.15);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .btn { 
            background: #00ff41; 
            color: #0a0e27; 
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover { box-shadow: 0 0 20px rgba(0, 255, 65, 0.6); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 App de Produtividade</h1>
        <div class="card">
            <h2>Bem-vindo!</h2>
            <p>Seu app está online! 🎉</p>
            <p>Este é o primeiro passo do seu app de produtividade com IA integrada.</p>
            <button class="btn">Abrir App</button>
        </div>
    </div>
</body>
</html>
